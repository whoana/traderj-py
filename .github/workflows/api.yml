name: API CI

on:
  push:
    paths: ['api/**', 'shared/**']
  pull_request:
    paths: ['api/**', 'shared/**']

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          pip install poetry
          cd shared && pip install -e .
          cd ../engine && poetry install
          cd ../api && poetry install

      - name: Lint (ruff)
        run: ruff check shared/ api/

      - name: Unit tests
        run: python -m pytest api/tests/ -v --cov=api --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          file: coverage.xml
          flags: api
