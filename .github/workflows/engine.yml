name: Engine CI

on:
  push:
    paths: ['engine/**', 'shared/**', 'migrations/**', '.github/workflows/engine.yml']
  pull_request:
    paths: ['engine/**', 'shared/**', 'migrations/**', '.github/workflows/engine.yml']

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          pip install poetry ruff pytest pytest-asyncio pytest-cov
          cd shared && pip install -e .
          cd ../engine && poetry install

      - name: Lint (ruff)
        run: ruff check shared/ engine/

      - name: Unit tests
        run: |
          cd engine && poetry run pytest tests/unit/ -v --cov=engine --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          file: engine/coverage.xml
          flags: engine
