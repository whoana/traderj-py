app = 'traderj-engine'
primary_region = 'nrt'

[build]
  dockerfile = "engine/Dockerfile"
  target = "production"

[env]
  DB_TYPE = "sqlite"
  DB_SQLITE_PATH = "/data/traderj.db"
  PYTHONUNBUFFERED = "1"
  API_ENABLED = "true"

[mounts]
  source = "traderj_data"
  destination = "/data"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
