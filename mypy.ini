[mypy]
python_version = 3.13
strict = true
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
check_untyped_defs = true
no_implicit_reexport = true

[mypy-ccxt.*]
ignore_missing_imports = true

[mypy-pandas_ta.*]
ignore_missing_imports = true

[mypy-apscheduler.*]
ignore_missing_imports = true

[mypy-aiosqlite.*]
ignore_missing_imports = true

[mypy-prometheus_client.*]
ignore_missing_imports = true
