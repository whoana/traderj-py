global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alert_rules.yml

scrape_configs:
  - job_name: "engine"
    static_configs:
      - targets: ["engine:8001"]
    metrics_path: /metrics

  - job_name: "api"
    static_configs:
      - targets: ["api:8000"]
    metrics_path: /metrics

  # NOTE: PostgreSQL does not expose /metrics natively.
  # To monitor Postgres, add postgres_exporter as a separate service
  # and scrape it instead. Direct scraping causes "invalid length of startup packet" errors.
  # - job_name: "postgres"
  #   static_configs:
  #     - targets: ["postgres-exporter:9187"]
